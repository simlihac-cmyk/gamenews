<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 - Nintendo Watch</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f6f7f9;
      color: #17202a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    .login-card {
      width: min(420px, calc(100vw - 32px));
      background: #fff;
      border: 1px solid #d9dee7;
      border-radius: 8px;
      padding: 24px;
    }
    h1 {
      margin: 0 0 6px;
      color: #d71920;
      font-size: 24px;
    }
    p { margin: 0 0 18px; color: #687385; }
    label {
      display: block;
      margin: 12px 0 4px;
      color: #687385;
      font-size: 13px;
      font-weight: 800;
    }
    input {
      width: 100%;
      min-height: 40px;
      border: 1px solid #d9dee7;
      border-radius: 7px;
      padding: 8px 10px;
      font: inherit;
    }
    button {
      width: 100%;
      min-height: 40px;
      margin-top: 16px;
      border: 1px solid #d71920;
      border-radius: 7px;
      background: #d71920;
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .error {
      margin: 12px 0;
      padding: 10px;
      border: 1px solid #f4b7b7;
      border-radius: 7px;
      background: #fff0f0;
      color: #b42318;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Nintendo Watch</h1>
    <p>개인 닌텐도 뉴스 아카이브에 로그인하세요.</p>
    {% if form.errors %}
      <div class="error">아이디나 비밀번호를 확인해 주세요.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <label for="{{ form.username.id_for_label }}">아이디</label>
      {{ form.username }}
      <label for="{{ form.password.id_for_label }}">비밀번호</label>
      {{ form.password }}
      <button type="submit">로그인</button>
    </form>
  </main>
</body>
</html>
