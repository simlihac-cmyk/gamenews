{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Nintendo Watch{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-soft: #fbfcfe;
      --line: #d9dee7;
      --text: #17202a;
      --muted: #687385;
      --accent: #d71920;
      --accent-soft: #fff0f0;
      --blue: #1f6feb;
      --green: #208a46;
      --amber: #a15c00;
      --red: #b42318;
      --violet: #7247c7;
      --cyan: #087990;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.55;
    }
    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--accent); }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--accent);
      white-space: nowrap;
    }
    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }
    .nav a {
      padding: 7px 10px;
      border-radius: 7px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }
    .nav a:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .nav form {
      margin: 0;
      display: inline-flex;
    }
    .nav button {
      min-height: auto;
      padding: 7px 10px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }
    .nav button:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .container {
      max-width: 1220px;
      margin: 0 auto;
      padding: 22px 20px 60px;
    }
    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    .muted { color: var(--muted); }
    .nowrap { white-space: nowrap; }
    .messages {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }
    .message {
      background: #eef7f0;
      border: 1px solid #c8e6cf;
      color: #174d2b;
      padding: 10px 12px;
      border-radius: 8px;
    }
    .filter {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: minmax(220px, 2fr) repeat(5, minmax(120px, 1fr));
      gap: 10px;
    }
    .filter.compact-filter {
      grid-template-columns: minmax(260px, 2fr) minmax(150px, 1fr) auto;
    }
    .filter label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: white;
      color: var(--text);
      padding: 7px 9px;
      font: inherit;
    }
    input[type="checkbox"] {
      width: auto;
      min-height: auto;
      padding: 0;
    }
    .span-2 { grid-column: span 2; }
    .filter-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 8px;
    }
    .checkline {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      font-weight: 800;
      color: #2c3645;
    }
    .quick-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: -6px 0 14px;
    }
    .quick-tabs a {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      padding: 5px 11px;
      color: #344054;
      font-size: 13px;
      font-weight: 800;
    }
    .quick-tabs a:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
    }
    button, .btn {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: white;
      color: var(--text);
      min-height: 34px;
      padding: 6px 10px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    button:hover, .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .btn-primary:hover { color: white; }
    .btn-danger:hover {
      border-color: var(--red);
      color: var(--red);
    }
    .btn-quiet {
      color: var(--muted);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .stack { display: grid; gap: 12px; }
    .timeline-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 132px;
      gap: 16px;
      padding: 15px 16px;
      border-left: 4px solid transparent;
    }
    .timeline-card.official { border-left-color: var(--green); }
    .timeline-card.reported { border-left-color: var(--blue); }
    .timeline-card.rumor { border-left-color: var(--amber); }
    .timeline-card.unknown { border-left-color: #8a94a6; }
    .timeline-card.important {
      box-shadow: 0 0 0 1px rgba(215, 25, 32, 0.08);
      background: linear-gradient(90deg, #fffafa 0, #fff 180px);
    }
    .timeline-card.is-read {
      background: #fbfcfe;
    }
    .timeline-card.is-read .item-title,
    .timeline-card.is-read .summary {
      opacity: 0.72;
    }
    .item-main {
      min-width: 0;
    }
    .item-side {
      display: grid;
      align-content: space-between;
      justify-items: end;
      gap: 10px;
      border-left: 1px solid var(--line);
      padding-left: 14px;
    }
    .item-title {
      margin: 8px 0 8px;
      font-size: 19px;
      line-height: 1.35;
    }
    .summary {
      color: #2c3645;
      margin: 0 0 12px;
    }
    .summary.compact {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 13px;
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: #344054;
      font-size: 12px;
      font-weight: 800;
    }
    .badge.official { background: #eaf7ee; border-color: #b8dfc2; color: var(--green); }
    .badge.reported { background: #eef5ff; border-color: #c8dcff; color: var(--blue); }
    .badge.rumor { background: #fff7ed; border-color: #ffd7a8; color: var(--amber); }
    .badge.unknown { background: #f2f4f7; color: #475467; }
    .badge.important { background: #fff0f0; border-color: #f4b7b7; color: var(--red); }
    .badge.confirmed { background: #eaf7ee; border-color: #b8dfc2; color: var(--green); }
    .badge.developing { background: #eef5ff; border-color: #c8dcff; color: var(--blue); }
    .badge.stale { background: #f2f4f7; color: #475467; }
    .badge.debunked { background: #fff0f0; border-color: #f4b7b7; color: var(--red); }
    .badge.tag-direct { background: #f0f7ff; border-color: #b9d9ff; color: var(--blue); }
    .badge.tag-release-date { background: #eef8f1; border-color: #bde3c7; color: var(--green); }
    .badge.tag-trailer { background: #f6f0ff; border-color: #d8c4ff; color: var(--violet); }
    .badge.tag-switch2 { background: #e7f8fb; border-color: #a8dfe8; color: var(--cyan); }
    .badge.tag-rumor, .badge.tag-leak { background: #fff7ed; border-color: #ffd7a8; color: var(--amber); }
    .badge.state {
      background: #fff;
      color: var(--muted);
    }
    .score {
      font-weight: 900;
      color: var(--red);
    }
    .score-box {
      width: 82px;
      min-height: 58px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      text-align: center;
    }
    .score-box strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      color: var(--red);
    }
    .score-box span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .card-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }
    .card-actions form {
      display: inline-flex;
    }
    .card-actions button,
    .card-actions .btn {
      min-height: 31px;
      padding: 5px 8px;
      font-size: 13px;
    }
    .franchise-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .issue-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
      font-size: 13px;
      font-weight: 800;
    }
    .issue-strip a {
      color: #2c3645;
    }
    .issue-strip a:hover {
      color: var(--accent);
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .stat-card strong {
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }
    .stat-card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .health-ok { color: var(--green); font-weight: 900; }
    .health-error { color: var(--red); font-weight: 900; }
    .issue-timeline {
      position: relative;
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }
    .issue-timeline::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 14px;
      border-left: 2px solid var(--line);
    }
    .timeline-entry {
      position: relative;
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 10px;
    }
    .timeline-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid var(--line);
      background: var(--surface);
      z-index: 1;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 900;
      color: var(--muted);
    }
    .timeline-entry.official .timeline-dot {
      border-color: var(--green);
      color: var(--green);
    }
    .timeline-entry.rumor .timeline-dot {
      border-color: var(--amber);
      color: var(--amber);
    }
    .issue-confirmed {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      border-color: #b8dfc2;
      background: #f4fbf6;
      color: #174d2b;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .table th, .table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    .table th {
      background: #f1f4f8;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }
    .table tr:last-child td { border-bottom: 0; }
    .pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #f1f4f8;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      max-height: 420px;
      overflow: auto;
    }
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }
    @media (max-width: 860px) {
      .topbar-inner, .page-head { align-items: flex-start; flex-direction: column; }
      .nav { justify-content: flex-start; }
      .filter { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .span-2 { grid-column: span 2; }
      .grid-2 { grid-template-columns: 1fr; }
      .timeline-card { grid-template-columns: 1fr; }
      .item-side {
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 12px 0 0;
        justify-items: start;
      }
      .card-actions { justify-content: flex-start; }
      .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .filter { grid-template-columns: 1fr; }
      .span-2 { grid-column: span 1; }
      .stat-grid { grid-template-columns: 1fr; }
      .item-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{% url 'news:item_list' %}">Nintendo Watch</a>
      <nav class="nav">
        <a href="{% url 'news:item_list' %}">타임라인</a>
        <a href="{% url 'news:issue_list' %}">이슈</a>
        <a href="{% url 'news:source_list' %}">출처</a>
        <a href="{% url 'news:source_health' %}">상태</a>
        <a href="{% url 'news:franchise_list' %}">프랜차이즈</a>
        <a href="/admin/">관리자</a>
        {% if request.user.is_authenticated %}
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">로그아웃</button>
          </form>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="container">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
