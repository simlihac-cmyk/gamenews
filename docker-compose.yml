services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nintendowatch
      POSTGRES_USER: nintendowatch
      POSTGRES_PASSWORD: nintendowatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
