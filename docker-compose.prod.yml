services:
  web:
    build: .
    command: gunicorn nintendowatch.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60
    env_file:
      - path: .env
        required: false
    ports:
      - "8010:8000"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nintendowatch
      POSTGRES_USER: nintendowatch
      POSTGRES_PASSWORD: nintendowatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
